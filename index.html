<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pluma y Tertulia — Albergue para artículos sin hogar</title>
  <meta name="description" content="Pluma y Tertulia: albergue para artículos sin hogar. Ensayos, poesía y cuentos en formato de periódico retro." />

  <!-- Open Graph (estáticos para todo el sitio) -->
  <meta property="og:title" content="Pluma y Tertulia" />
  <meta property="og:description" content="Albergue para artículos sin hogar." />
  <meta property="og:type" content="website" />

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="alternate" type="application/rss+xml" title="Pluma y Tertulia" href="feed.xml" />
  <!-- Tipografías IBM Plex autoalojadas (licencia OFL): sin peticiones a
       terceros, coherente con la promesa de "sin rastreadores". -->
  <link rel="stylesheet" href="assets/css/fonts.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-theme="paper">
  <script>
    /* Aplica el tema guardado (o el del sistema) antes del primer pintado
       para evitar el destello de tema claro en "tinta". */
    (function () {
      try {
        var t = localStorage.getItem("pyt-theme");
        if (t !== "paper" && t !== "ink")
          t = window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches ? "ink" : "paper";
        document.body.setAttribute("data-theme", t);
      } catch (e) { /* modo privado: se queda "paper" */ }
    })();
  </script>
  <a class="skip-link" href="#main">Saltar al contenido</a>

  <header class="masthead" id="top">
    <div class="masthead__bar">
      <button class="term-toggle" id="themeToggle" title="Cambiar tema" aria-label="Cambiar tema">
        <span class="term-toggle__dot"></span><span id="themeLabel">papel</span>
      </button>
      <span class="masthead__meta" id="mastheadDate"></span>
      <span class="masthead__meta masthead__edition">Edición No. <span id="editionNo">—</span></span>
    </div>

    <a href="#/" class="masthead__title" aria-label="Pluma y Tertulia — Inicio">
      <span class="masthead__prompt">tertulia:~$</span> Pluma&nbsp;y&nbsp;Tertulia<span class="cursor">_</span>
    </a>
    <p class="masthead__tagline">Albergue para artículos sin hogar</p>

    <nav class="mainnav" aria-label="Navegación principal">
      <a href="#/">Portada</a>
      <a href="#/generos">Géneros</a>
      <a href="#/autores">Autores</a>
      <a href="#/archivo">Archivo</a>
      <a href="#/contribuciones">Contribuir</a>
    </nav>
  </header>

  <main id="main" class="wrap" tabindex="-1">
    <div id="view" class="view">
      <div class="loading">cargando<span class="cursor">_</span></div>
    </div>
  </main>

  <footer class="foot">
    <div class="foot__rule"></div>
    <p class="foot__colophon">Pluma y Tertulia</p>
    <p class="foot__line">Copyright &copy; <span id="footYear"></span> Pluma y Tertulia &amp; Contribuidores</p>
    <p class="foot__line foot__muted">Albergue para artículos sin hogar · Sin rastreadores.</p>
    <p class="foot__line foot__muted">Primus Circumdedisti Me</p>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
